<a href="#main-content" class="skip-link">Skip to main content</a>

<header class="app-header">
  <div class="header-inner">
    <a routerLink="/about" class="app-logo" aria-label="TFL Home">
      <span class="logo-icon" aria-hidden="true">⚽</span>
      <span class="logo-name">TFL</span>
    </a>

    <nav aria-label="Main navigation">
      <ul class="nav-links" role="list">
        <li>
          <a routerLink="/about" routerLinkActive="active"
             [routerLinkActiveOptions]="{exact: true}">Home</a>
        </li>
        @if (isAuthenticated()) {
          <li><a routerLink="/players" routerLinkActive="active">Players</a></li>
          <li><a routerLink="/nextdraft" routerLinkActive="active">Draft</a></li>
          <li><a routerLink="/games" routerLinkActive="active">Games</a></li>
          <li><a routerLink="/recent" routerLinkActive="active">Recent</a></li>
          @if (isAdmin()) {
            <li><a routerLink="/admin" routerLinkActive="active">Admin</a></li>
          }
        }
      </ul>
    </nav>

    <div class="auth-section">
      @if (isAuthenticated()) {
        <span class="user-email" aria-label="Signed in as {{ currentUser()?.email }}">
          {{ currentUser()?.email }}
        </span>
        <button type="button" class="btn-signout" (click)="signOut()">Sign Out</button>
      } @else {
        <a routerLink="/signin" class="btn-signin">Sign In</a>
      }
    </div>
  </div>
</header>

<main id="main-content" class="app-main">
  <router-outlet />
</main>

<footer class="app-footer">
  <a routerLink="/privacy">Privacy Policy</a>
  <span aria-hidden="true">&middot;</span>
  <span>Thursday Football League</span>
</footer>
